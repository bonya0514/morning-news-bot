news_categories:
  - name: テクノロジー・AI
    emoji: 🤖
    query: "AI 新モデル 発表 リリース 新機能"
    sites:
      - itmedia.co.jp
      - ascii.jp

  - name: ガジェット
    emoji: 📱
    query: "スマートフォン イヤホン 新製品 発売 レビュー"
    sites:
      - gizmodo.jp
      - lifehacker.jp

  - name: ゲーム
    emoji: 🎮
    query: "新作ゲーム 発売日 Nintendo Switch PS5"
    sites:
      - www.4gamer.net
      - www.famitsu.com

gunpla_categories:
  - name: ガンプラ新作・再販
    query: "ガンプラ 再販 カレンダー"
    sites:
      - kaigoshinootakunaburogu.com
      - harmonizers-jp.com

# 再販カレンダーの既知URLパターン（{year}=西暦、{month_en}=英語月名）
gunpla_url_templates:
  - "https://kaigoshinootakunaburogu.com/gunpla-resale-calendar-{year}{month_en}"
  - "https://kaigoshinootakunaburogu.com/gunpla-plasticmodel-resale-{year}{month_en}"

# 表示するグレード（前方一致。HGでHGUC/HGCE/HGFC等も含む）
gunpla_grades:
  - HG
  - RG
  - MG
  - MGSD
  - RE/100
  - FULL MECHANICS
  - EG
  - ENTRY GRADE
  - PG

schedule:
  hour: 7
  minute: 0
